name: Weekly Market Sync & Analysis

on:
  schedule:
    # 毎週月曜 09:00 JST（UTC 00:00）に実行
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry Run（書き込みなしテスト）"
        required: false
        type: boolean
        default: false
      skip_analysis:
        description: "AI分析をスキップ（価格同期のみ）"
        required: false
        type: boolean
        default: false

jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate environment variables
        env:
          NEXT_PUBLIC_WORDPRESS_API_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_API_URL }}
          WP_APP_USER: ${{ secrets.WP_APP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          echo "=== 環境変数チェック ==="
          MISSING=""
          if [ -z "$NEXT_PUBLIC_WORDPRESS_API_URL" ]; then
            MISSING="$MISSING NEXT_PUBLIC_WORDPRESS_API_URL"
          else
            echo "✓ NEXT_PUBLIC_WORDPRESS_API_URL: ${NEXT_PUBLIC_WORDPRESS_API_URL:0:40}..."
          fi
          if [ -z "$WP_APP_USER" ]; then
            MISSING="$MISSING WP_APP_USER"
          else
            echo "✓ WP_APP_USER: (設定済み)"
          fi
          if [ -z "$WP_APP_PASSWORD" ]; then
            MISSING="$MISSING WP_APP_PASSWORD"
          else
            echo "✓ WP_APP_PASSWORD: (設定済み)"
          fi
          if [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ]; then
            echo "⚠ GOOGLE_GENERATIVE_AI_API_KEY: (未設定 — AI分析はフォールバックになります)"
          else
            echo "✓ GOOGLE_GENERATIVE_AI_API_KEY: (設定済み)"
          fi
          if [ -n "$MISSING" ]; then
            echo "::error::必須環境変数が未設定です:$MISSING"
            echo "GitHub リポジトリの Settings > Secrets and variables > Actions で設定してください。"
            exit 1
          fi

      - name: Run price sync
        env:
          NEXT_PUBLIC_WORDPRESS_API_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_API_URL }}
          WP_APP_USER: ${{ secrets.WP_APP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "=== 価格同期開始 ==="
          npm run sync-prices -- $ARGS

      - name: Run market analysis
        if: inputs.skip_analysis != true
        env:
          NEXT_PUBLIC_WORDPRESS_API_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_API_URL }}
          WP_APP_USER: ${{ secrets.WP_APP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: |
          if [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ]; then
            echo "⚠ GOOGLE_GENERATIVE_AI_API_KEY が未設定のため AI 分析をスキップします"
            exit 0
          fi
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "=== AI分析開始 ==="
          npm run analyze-market -- $ARGS
